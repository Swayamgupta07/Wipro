<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<style>
    body {
        background: rgb(221, 130, 221);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .dashboard {
        display: flex;
        gap: 30px;
        width: 1000px;
        align-items: stretch;
    }

    .left-panel {
        flex: 1.5;
        background-color: aliceblue;
        padding: 30px;
        border-radius: 10px;
        border: 2px solid black;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        display: flex;
        flex-direction: column;
    }

    .right-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .box {
        background-color: aliceblue;
        padding: 30px;
        border-radius: 10px;
        border: 2px solid black;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
    }

    .stat-box {
        background: white;
        padding: 20px;
        border-radius: 10px;
        border: 2px solid black;
        text-align: center;
    }

    .stat-box h3 { 
        margin: 0; 
        font-size: 18px; 
        color: black; 
    }
    .stat-box .count { 
        font-size: 36px; 
        font-weight: bold; 
        color: purple; 
    }

    .form-control {
        width: 100%;
        border-radius: 5px;
        border: 1px solid whitesmoke;
        margin-bottom: 15px;
        padding: 12px;
        height: auto;
    }

    .button-container {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 20px;
    }

    .btn {
        flex: 1;
        padding: 10px;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    #studentList {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .student-card {
        background: aliceblue;
        padding: 10px 15px;
        border-radius: 5px;
        box-shadow: 0 2px 8px black;
        border-left: 4px solid #764ba2;
    }

    .student-card h4 {
        margin: 0 0 5px 0;
        color: #333;
    }

    .student-card p {
        margin: 0;
        color: #666;
        font-size: 14px;
    }
</style>

<body>
    <div class="dashboard">
        <div class="left-panel">
            <h2 style="text-align: center; margin-bottom: 20px;">Student Records</h2>
            <div id="studentList">
            </div>
        </div>

        <div class="right-panel">
            <div class="stat-box">
                <h3>Total Students</h3>
                <div id="totalDisplay" class="count">0</div>
            </div>

            <div class="stat-box">
                <h3>Batch B002 Students</h3>
                <div id="b002Display" class="count">0</div>
            </div>

            <div class="box">
                <h3 style="text-align: center; margin-bottom: 20px;">Add Student</h3>
                <form id="studentForm">
                    <input type="text" id="studentName" class="form-control" placeholder="Name" required minlength="2">
                    <input type="text" id="studentAddress" class="form-control" placeholder="Enter Address" required>
                    <select id="studentBatch" class="form-control" required style="color: #666;">
                        <option value="" disabled selected>Select Batch</option>
                        <option value="B001">B001</option>
                        <option value="B002">B002</option>
                        <option value="B003">B003</option>
                    </select>

                    <div class="button-container">
                        <button type="submit" class="btn btn-primary">Add New</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
        <script src="script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"> </script>
    </div>
</body>

</html>
