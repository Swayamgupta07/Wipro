<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        padding: 20px;
        line-height: 1.6;
        background-color: #f4f7f6;
      }
      .container {
        max-width: 500px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      }
      .section {
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 1px solid #eee;
      }
      h2 {
        color: #333;
        text-align: center;
        margin-top: 0;
      }
      h3 {
        color: #555;
        font-size: 1rem;
        margin-bottom: 10px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        color: #666;
      }
      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box;
      }
      button {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
        margin-top: 5px;
        transition: background 0.3s;
      }
      button:hover {
        background-color: #0056b3;
      }
      .btn-group {
        display: flex;
        gap: 10px;
      }
      .btn-group button {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Exception Handling</h2>

      <div class="section">
        <label>Numerator</label>
        <input type="number" id="num" placeholder="Enter number" />
        <label>Denominator</label>
        <input type="number" id="den" placeholder="Enter denominator" />
        <button type="button" onclick="divideNumbers()">
          Calculate Division
        </button>
      </div>

      <div class="section">
        <label>Enter Age</label>
        <input type="number" id="ageInput" placeholder="Enter age" />
        <button type="button" onclick="checkAge()">
          Check Eligibility
        </button>
      </div>

      <div class="section">
        <label>Username (min 5 chars)</label>
        <input type="text" id="usernameInput" placeholder="Enter username" />
        <button type="button" onclick="validateUsername()">
          Validate User
        </button>
      </div>

      <div class="section">
        <label>Value 1</label>
        <input type="text" id="calcVal1" placeholder="Number 1" />
        <label>Value 2</label>
        <input type="text" id="calcVal2" placeholder="Number 2" />
        <div class="btn-group">
          <button type="button" onclick="handleCalculator('add')">Add</button>
          <button type="button" onclick="handleCalculator('divide')">
            Divide
          </button>
        </div>
      </div>

    </div>
    <script src="script.js"></script>
  </body>
</html>
